version: "3.9"
services:
  api:
    build: .
    ports: ["3000:3000"]
    env_file: [.env]
    depends_on: [db]
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: tamv
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
